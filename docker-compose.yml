name: restaurant-management-system

services:
  postgres_db:
    image: postgres:16
    container_name: restaurant_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo_db:
    image: mongo:latest
    container_name: restaurant_mongo
    restart: always
    ports:
      - ${PORT_MONGO}:27017
    volumes:
      - mongo_data:/data/db

  api_gateway:
    build: ./Backend/services/api-gateway
    container_name: rms_api_gateway
    ports:
      - "3000:3000"
    depends_on:
      identity_service:
        condition: service_started
      management_service:
        condition: service_started
      order_service:
        condition: service_started
      analytics_service:
        condition: service_started
    env_file: ./Backend/.env
    environment:
      - IDENTITY_SERVICE_URL=http://identity_service:3001
      - MANAGEMENT_SERVICE_URL=http://management_service:3002
      - ORDER_SERVICE_URL=http://order_service:3003
      - ANALYTICS_SERVICE_URL=http://analytics_service:3004

  identity_service:
    build: ./Backend/services/identity-service
    container_name: rms_identity_service
    ports:
      - "3001:3001"
    env_file: ./Backend/.env
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - MONGO_URI=mongodb://mongo_db:27017/restaurant_management_db 
    depends_on:
      postgres_db:
        condition: service_healthy 
      mongo_db:
        condition: service_started

  management_service:
    build: ./Backend/services/management-service
    container_name: rms_management_service
    ports:
      - "3002:3002"
    env_file: ./Backend/.env
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - MONGO_URI=mongodb://mongo_db:27017/restaurant_management_db
    depends_on:
      postgres_db:
        condition: service_healthy
      mongo_db:
        condition: service_started

  order_service:
    build: ./Backend/services/order-service
    container_name: rms_order_service
    ports:
      - "3003:3003"
    env_file: ./Backend/.env
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - MONGO_URI=mongodb://mongo_db:27017/restaurant_management_db
    depends_on:
      postgres_db:
        condition: service_healthy
      mongo_db:
        condition: service_started

  analytics_service:
    build: ./Backend/services/analytics-events-service
    container_name: rms_analytics_service
    ports:
      - "3004:3004"
    env_file: ./Backend/.env
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - MONGO_URI=mongodb://mongo_db:27017/restaurant_management_db
    depends_on:
      postgres_db:
        condition: service_healthy
      mongo_db:
        condition: service_started

  frontend:
    build: ./Frontend
    container_name: rms_frontend
    ports:
      - "5173:5173"
    depends_on:
      api_gateway:
        condition: service_started

volumes:
  postgres_data:
  mongo_data:
